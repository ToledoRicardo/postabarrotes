name: tiendabarrotes
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.1
  path: ^1.9.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  screenshot: ^3.0.0
  path_provider: ^2.1.1
  url_launcher: ^6.3.0
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/TiendaDeAbarrotesd.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/TiendaDeAbarrotesd.png"
